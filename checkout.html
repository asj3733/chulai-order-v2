<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>初萊食麵｜確認訂單</title>

<link
    rel="stylesheet"
    href="css/style.css">

<link
    rel="stylesheet"
    href="css/checkout.css">

</head>


<body>


<!-- =========================
     頁首
========================= -->

<header class="page-header">

    <a
        href="index.html"
        class="brand-home">

        🍜 初萊食麵

    </a>

    <p>
        確認訂單
    </p>

</header>



<main class="checkout-page">


<!-- =========================
     歡迎回來
========================= -->

<section
    id="welcome-customer"
    class="welcome-customer"
    style="display:none;">

    👋 歡迎回來，

    <strong id="welcome-name"></strong>

</section>



<!-- =========================
     訂單內容
========================= -->

<section class="checkout-section">

    <h2>
        🛒 您的訂單
    </h2>


    <div id="order-list">

        尚未加入商品

    </div>

</section>



<!-- =========================
     顧客資料
========================= -->

<section class="checkout-section">

    <h2>
        👤 顧客資料
    </h2>


    <label>

        姓名

        <input
            type="text"
            id="customer-name"
            placeholder="請輸入姓名"
            autocomplete="name">

    </label>


    <label>

        手機號碼

        <input
            type="tel"
            id="customer-phone"
            placeholder="09xxxxxxxx"
            maxlength="10"
            inputmode="numeric"
            autocomplete="tel">

    </label>


    <div
        id="phone-error"
        class="form-error"
        style="display:none;">

        請輸入正確的手機號碼

    </div>

</section>



<!-- =========================
     取餐方式
========================= -->

<section class="checkout-section">

    <h2>
        🍜 取餐方式
    </h2>


    <label class="choice-label">

        <input
            type="radio"
            name="order-type"
            value="內用"
            checked>

        內用

    </label>


    <label class="choice-label">

        <input
            type="radio"
            name="order-type"
            value="外帶">

        外帶

    </label>

</section>



<!-- =========================
     外帶設定
========================= -->

<section
    id="takeout-options"
    class="checkout-section"
    style="display:none;">

    <h2>
        🥡 外帶設定
    </h2>


    <label>

        取餐時間

        <select id="pickup-time">

            <option value="">
                請選擇取餐時間
            </option>

        </select>

    </label>


    <h3>
        🍴 餐具
    </h3>


    <label class="choice-label">

        <input
            type="radio"
            name="tableware"
            value="需要餐具"
            checked>

        需要餐具

    </label>


    <label class="choice-label">

        <input
            type="radio"
            name="tableware"
            value="不需要餐具">

        不需要餐具

    </label>

</section>



<!-- =========================
     備註
========================= -->

<section class="checkout-section">

    <h2>
        📝 備註
    </h2>


    <textarea
        id="customer-note"
        rows="4"
        placeholder="有其他需要告知店家的事項，可以填寫在這裡"></textarea>

</section>



<!-- =========================
     總金額
========================= -->

<section class="checkout-total">

    <strong>
        訂單合計
    </strong>

    <span>
        NT$<b id="order-total">0</b>
    </span>

</section>



<!-- =========================
     送出訂單
========================= -->

<button
    type="button"
    id="submit-order-btn"
    class="submit-order-btn">

    📲 送出訂單

</button>


<button
    type="button"
    id="back-order-btn"
    class="back-order-btn">

    ← 返回修改餐點

</button>



<!-- =========================
     送單結果
========================= -->

<div
    id="submit-result"
    class="submit-result"
    style="display:none;">

</div>


</main>



<script src="js/checkout.js"></script>

</body>

</html>
