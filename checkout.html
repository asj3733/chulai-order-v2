<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初萊食麵｜結帳</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="page-header">
    <h1>🍜 初萊食麵</h1>
    <p>確認訂單</p>
</header>

<main class="checkout-page">

    <div class="checkout-card">

        <h2>🧾 您的餐點</h2>

        <div id="order-list">
            載入中...
        </div>

    </div>

    <div class="checkout-card">

        <h2>👤 取餐資訊</h2>

        <label>姓名</label>
        <input type="text" id="customer-name" placeholder="請輸入姓名">

        <label>電話</label>
        <input type="tel" id="customer-phone" placeholder="請輸入電話">

        <label>用餐方式</label>

        <label><input type="radio" name="type" value="外帶" checked> 外帶</label>
        <label><input type="radio" name="type" value="內用"> 內用</label>

        <label>備註</label>

        <textarea id="remark" rows="4" placeholder="例如：不要蔥、加辣、不要香菜"></textarea>

        <button id="submit-order">
            確認送出訂單
        </button>

    </div>

</main>

<script src="js/checkout.js"></script>

</body>
</html>
