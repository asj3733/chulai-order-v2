<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初萊食麵｜結帳</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="page-header">
    <h1>🍜 初萊食麵</h1>
    <p>確認訂單</p>
</header>

<main style="padding:20px;">

    <h2>您的餐點</h2>

    <div id="order-list">
        載入中...
    </div>

    <hr>

    <h3>姓名</h3>
    <input type="text" id="customer-name" placeholder="請輸入姓名">

    <h3>電話</h3>
    <input type="tel" id="customer-phone" placeholder="請輸入電話">

    <h3>用餐方式</h3>

    <label><input type="radio" name="type" value="外帶" checked> 外帶</label><br>

    <label><input type="radio" name="type" value="內用"> 內用</label>

    <h3>備註</h3>

    <textarea id="remark" rows="4" placeholder="例如：不要蔥、加辣"></textarea>

    <br><br>

    <button id="submit-order">
        送出訂單
    </button>

</main>

<script src="js/checkout.js"></script>

</body>
</html>
