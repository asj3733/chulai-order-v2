<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>初萊食麵｜確認訂單</title>

<link
    rel="stylesheet"
    href="css/style.css"
>

<link
    rel="stylesheet"
    href="css/checkout.css"
>

</head>


<body>


<!-- =========================
     頁首
========================= -->

<header class="page-header">

    <a
        href="index.html"
        class="brand-link"
    >

        <h1>
            🍜 初萊食麵
        </h1>

    </a>

    <p>
        確認訂單
    </p>

</header>



<main class="checkout-page">


<!-- =========================
     訂單內容
========================= -->

<section class="checkout-card">

    <h2>
        🛒 我的訂單
    </h2>


    <div id="checkout-cart">

        載入中...

    </div>


    <div class="checkout-total">

        合計 NT$

        <span id="checkout-total">
            0
        </span>

    </div>

</section>



<!-- =========================
     顧客資料
========================= -->

<section class="checkout-card">

    <h2>
        👤 顧客資料
    </h2>


    <label for="customer-name">

        姓名

    </label>

    <input
        type="text"
        id="customer-name"
        placeholder="請輸入您的姓名"
        autocomplete="name"
    >



    <label for="customer-phone">

        電話

    </label>

    <input
        type="tel"
        id="customer-phone"
        placeholder="請輸入您的電話"
        autocomplete="tel"
    >

</section>



<!-- =========================
     取餐方式
========================= -->

<section class="checkout-card">

    <h2>
        🍽️ 取餐方式
    </h2>


    <div class="order-type">


        <label>

            <input
                type="radio"
                name="orderType"
                value="內用"
                checked
            >

            🏠 內用

        </label>



        <label>

            <input
                type="radio"
                name="orderType"
                value="外帶"
            >

            🛍️ 外帶

        </label>


    </div>



    <!-- =========================
         外帶選項
    ========================= -->

    <div
        id="takeout-options"
        style="display:none;"
    >


        <h3>
            🕐 取餐時間
        </h3>


        <div class="pickup-time-options">


            <label>

                <input
                    type="radio"
                    name="pickupTimeType"
                    value="儘快取餐"
                    checked
                >

                ⚡ 儘快取餐

            </label>



            <label>

                <input
                    type="radio"
                    name="pickupTimeType"
                    value="提前預約"
                >

                🕐 提前預約

            </label>


        </div>



        <!-- =========================
             預約日期時間
        ========================= -->

        <div
            id="reservation-time"
            style="display:none;"
        >


            <label for="pickup-date">

                📅 取餐日期

            </label>


            <input
                type="date"
                id="pickup-date"
            >



            <label for="pickup-time">

                ⏰ 取餐時間

            </label>


            <input
                type="time"
                id="pickup-time"
            >


        </div>



        <!-- =========================
             不需餐具
        ========================= -->

        <label class="no-utensils-option">

            <input
                type="checkbox"
                id="no-utensils"
            >

            ♻️ 外帶不需要餐具

        </label>


    </div>

</section>



<!-- =========================
     備註
========================= -->

<section class="checkout-card">

    <h2>
        📝 備註
    </h2>


    <textarea
        id="order-note"
        placeholder="有其他需要告知店家的事項再填寫即可"
    ></textarea>


</section>



<!-- =========================
     送出訂單
========================= -->

<button
    type="button"
    id="submit-order"
>

    🍜 確認送出訂單

</button>



<!-- =========================
     返回點餐
========================= -->

<button
    type="button"
    class="back-order-btn"
    onclick="window.location.href='order.html'"
>

    ← 返回修改訂單

</button>


</main>



<!-- =========================
     JS
========================= -->

<script src="js/checkout.js"></script>


</body>

</html>
