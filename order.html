<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>初萊食麵｜線上點餐</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/order.css">

</head>

<body>

<header class="page-header">

    <h1>🍜 初萊食麵</h1>

    <p>線上點餐</p>

</header>

<main class="order-page">
<nav class="category-nav">

<button>🍜 麵類</button>

<button>🍢 關東煮</button>

<button>🥟 小菜</button>

<button>🥣 湯品</button>

<button>🍚 飯類</button>

<button>🥬 其他</button>

</nav>
    <div id="menu"></div>

<!-- 浮動購物車 -->
<div id="floating-cart" class="floating-cart">

    <div class="cart-left">
        <div class="cart-count">
            🛒 <span id="cart-count">0</span> 項
        </div>

        <div class="cart-total">
            NT$ <span id="total">0</span>
        </div>
    </div>

    <button id="checkout-btn">
        前往結帳 →
    </button>

</div>

<!-- 原本購物車 -->
<h2>🛒 購物車</h2>

<div id="cart">
尚未加入商品
</div>


</main>
<script src="js/menu.js"></script>
<script src="js/order.js"></script>
<!-- 客製化視窗 -->

<div id="customModal" class="modal">

    <div class="modal-box">

        <h2 id="modalTitle">商品客製化</h2>


        <!-- 麵類選項 -->

<h3 id="noodleSelect">🍜 麵條</h3>

<div id="noodleSelectBox">

<label>
<input type="radio" name="noodle" value="細麵" checked>
細麵
</label>

<label>
<input type="radio" name="noodle" value="粗麵">
粗麵
</label>

</div>

<h3>🥬 客製化</h3>

<label>
<input type="checkbox" id="noVegetable">
不加菜
</label>

<label>
<input type="checkbox" id="noOnion">
不加蔥
</label>

<h3>🍢 醬料</h3>

<label>
<input type="radio" name="sauce" value="醬油膏" checked>
醬油膏
</label>

<label>
<input type="radio" name="sauce" value="番茄醬">
番茄醬
</label>

<label>
<input type="radio" name="sauce" value="辣椒">
辣椒
</label>

<label>
<input type="radio" name="sauce" value="都不加">
都不加
</label>



        <button onclick="confirmCustom()">
            ✅ 加入購物車
        </button>


        <button onclick="closeModal()">
            取消
        </button>


    </div>

</div>
</body>

</html>
