<!DOCTYPE html>

<head>

<link rel="stylesheet" href="css/style.css">

<body>

<header class="page-header">

    <h1>🍜 初萊食麵</h1>

    <p>線上點餐</p>

</header>

<main class="order-page">
<nav class="category-nav">

    <button class="category-btn active" onclick="changeCategory('麵類',this)">🍜 麵類</button>

    <button class="category-btn" onclick="changeCategory('關東煮',this)">🍢 關東煮</button>

    <button class="category-btn" onclick="changeCategory('小菜',this)">🥟 小菜</button>

    <button class="category-btn" onclick="changeCategory('湯品',this)">🥣 湯品</button>

    <button class="category-btn" onclick="changeCategory('飯類',this)">🍚 飯類</button>

    <button class="category-btn" onclick="changeCategory('青菜',this)">🥬 青菜</button>

</nav>
    <div id="menu"></div>

   <div id="menu"></div>

<!-- 浮動購物車 -->
<div id="floating-cart" class="floating-cart">

    <div class="cart-left">
        <div class="cart-count">
            🛒 <span id="cart-count">0</span> 項
        </div>

        <div class="cart-total">
            NT$ <span id="total">0</span>
        </div>
    </div>

    <button id="checkout-btn">
        前往結帳 →
    </button>

</div>

<!-- 原本購物車 -->
<div id="cart" style="display:none;"></div>


</main>
