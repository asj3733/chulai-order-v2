<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>初萊食麵｜線上點餐</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/order.css">

</head>

<body>

<header class="page-header">

    <h1>🍜 初萊食麵</h1>

    <p>線上點餐</p>

</header>


<main class="order-page">


<!-- =========================
     商品分類
========================= -->

<nav class="category-nav">

    <button type="button" data-category="麵類">
        🍜 麵類
    </button>

    <button type="button" data-category="關東煮">
        🍢 關東煮
    </button>

    <button type="button" data-category="小菜">
        🥟 小菜
    </button>

    <button type="button" data-category="湯類">
        🥣 湯品
    </button>

    <button type="button" data-category="其他">
        🍚 飯類
    </button>

</nav>


<!-- =========================
     商品區
========================= -->

<div id="menu"></div>


<!-- =========================
     浮動購物車
========================= -->

<div id="floating-cart" class="floating-cart">

    <div class="cart-left">

        <div class="cart-count">

            🛒
            <span id="cart-count">0</span>
            項

        </div>

        <div class="cart-total">

            NT$
            <span id="total">0</span>

        </div>

    </div>


    <button
        type="button"
        id="checkout-btn">

        前往結帳 →

    </button>

</div>


<!-- =========================
     購物車
========================= -->

<h2>🛒 購物車</h2>

<div id="cart">

    尚未加入商品

</div>


</main>



<!-- =========================
     客製化視窗
========================= -->

<div
    id="customModal"
    class="modal">


    <div class="modal-box">


        <!-- 商品名稱 -->

        <h2 id="modalTitle">

            商品客製化

        </h2>



        <!-- =========================
             麵類選項
        ========================= -->

        <div id="noodleOption">


            <!-- 麵條 -->

            <div id="noodleSelectArea">

                <h3>
                    🍜 麵條
                </h3>


                <label>

                    <input
                        type="radio"
                        name="noodle"
                        value="細麵">

                    細麵

                </label>


                <label>

                    <input
                        type="radio"
                        name="noodle"
                        value="粗麵"
                        checked>

                    粗麵

                </label>

            </div>



            <!-- 辣度 -->

            <h3>
                🌶 辣度
            </h3>


            <label>

                <input
                    type="radio"
                    name="spicy"
                    value="不辣"
                    checked>

                不辣

            </label>


            <label>

                <input
                    type="radio"
                    name="spicy"
                    value="小辣">

                小辣

            </label>


            <label>

                <input
                    type="radio"
                    name="spicy"
                    value="中辣">

                中辣

            </label>


            <label>

                <input
                    type="radio"
                    name="spicy"
                    value="大辣">

                大辣

            </label>



            <!-- 客製化 -->

            <h3>
                🥬 客製化
            </h3>


            <label>

                <input
                    type="checkbox"
                    id="noVegetable">

                不加菜

            </label>


            <label>

                <input
                    type="checkbox"
                    id="noOnion">

                不加蔥

            </label>


        </div>



<!-- =========================
     關東煮選項
========================= -->

<div
    id="odenOption"
    style="display:none;">

    <h3>
        🍢 醬料（可複選）
    </h3>

    <label>

        <input
            type="checkbox"
            name="sauce"
            value="醬油膏"
            checked>

        醬油膏

    </label>


    <label>

        <input
            type="checkbox"
            name="sauce"
            value="番茄醬">

        番茄醬

    </label>


    <label>

        <input
            type="checkbox"
            name="sauce"
            value="辣椒">

        辣椒

    </label>


    <label>

        <input
            type="checkbox"
            id="noSauce"
            name="sauce"
            value="都不加">

        都不加

    </label>

</div>
        <!-- =========================
             數量
        ========================= -->

        <h3>
            數量
        </h3>


        <div class="modal-qty">

            <button
                type="button"
                onclick="changeModalQty(-1)">

                －

            </button>


            <span id="modalQty">

                1

            </span>


            <button
                type="button"
                onclick="changeModalQty(1)">

                ＋

            </button>

        </div>



        <!-- =========================
             加入購物車
        ========================= -->

        <button
            type="button"
            class="add-cart-btn"
            onclick="confirmCustom()">

            🛒 加入購物車

        </button>



        <!-- =========================
             取消
        ========================= -->

        <button
            type="button"
            class="cancel-btn"
            onclick="closeModal()">

            取消

        </button>


    </div>

</div>



<!-- =========================
     JS
========================= -->

<script src="js/menu.js"></script>

<script src="js/order.js"></script>


</body>

</html>
